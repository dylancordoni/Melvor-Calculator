<div class="modal-backdrop" id="masteryModal">

    <div class="mastery-modal">

        <button class="close-modal" id="closeModal">
            ✕
        </button>

        <h1 id="modalTitle">
            Mastery Calculator
        </h1>

        <div class="input-group">
            <label>Current Skill Level</label>
            <input type="number" id="skillLevel" value="1">
        </div>

        <div class="input-group">
            <label>Current Mastery Level</label>

            <input type="number" id="currentLevel" value="1">
        </div>

        <div class="input-group">
            <label>Current Mastery XP</label>

            <input type="number" id="currentXP" value="0">
        </div>

        <div class="input-group">
            <label>Target Level</label>

            <input type="number" id="targetLevel" value="99">
        </div>

        <div class="input-group">
            <label>Bonus %</label>

            <input type="number" id="bonus" value="0">
        </div>

        <button id="calculateBtn">
            Calculate
        </button>

        <div class="results">

            <p>
                MXP/Action:
                <span id="mxpPerAction">-</span>
            </p>

            <p>
                Time to Target:
                <span id="timeToTarget">-</span>
            </p>

        </div>

    </div>

</div>
