<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Melvor Calculator</title>

    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/woodcutting.css">
    <link rel="stylesheet" href="css/fishing.css">
    <link rel="stylesheet" href="css/firemaking.css">
</head>

<body>

    <header>
        <div class="logo">Melvor Calculator</div>

        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main class="main-layout">

        <!-- LEFT SIDEBAR -->
        <aside class="sidebar">

            <h2>Skills</h2>

            <div class="skill-buttons">

                <button data-skill="woodcutting">
                    <img src="assets/skills/woodcutting.png" alt="Woodcutting">
                    <span>Woodcutting</span>
                </button>

                <button data-skill="fishing">
                    <img src="assets/skills/fishing.png" alt="Fishing">
                    <span>Fishing</span>
                </button>

                <button data-skill="firemaking">
                    <img src="assets/skills/firemaking.png" alt="Firemaking">
                    <span>Firemaking</span>
                </button>

                <button data-skill="cooking">
                    <img src="assets/skills/cooking.png" alt="Cooking">
                    <span>Cooking</span>
                </button>

                <button data-skill="mining">
                    <img src="assets/skills/mining.png" alt="Mining">
                    <span>Mining</span>
                </button>

                <button data-skill="smithing">
                    <img src="assets/skills/smithing.png" alt="Smithing">
                    <span>Smithing</span>
                </button>

                <button data-skill="thieving">
                    <img src="assets/skills/thieving.png" alt="Thieving">
                    <span>Thieving</span>
                </button>

                <button data-skill="fletching">
                    <img src="assets/skills/fletching.png" alt="Fletching">
                    <span>Fletching</span>
                </button>

                <button data-skill="crafting">
                    <img src="assets/skills/crafting.png" alt="Crafting">
                    <span>Crafting</span>
                </button>

                <button data-skill="runecrafting">
                    <img src="assets/skills/runecrafting.png" alt="Runecrafting">
                    <span>Runecrafting</span>
                </button>

                <button data-skill="herblore">
                    <img src="assets/skills/herblore.png" alt="Herblore">
                    <span>Herblore</span>
                </button>

                <button data-skill="agility">
                    <img src="assets/skills/agility.png" alt="Agility">
                    <span>Agility</span>
                </button>

                <button data-skill="summoning">
                    <img src="assets/skills/summoning.png" alt="Summoning">
                    <span>Summoning</span>
                </button>

                <button data-skill="astrology">
                    <img src="assets/skills/astrology.png" alt="Astrology">
                    <span>Astrology</span>
                </button>

                <button data-skill="alt-magic">
                    <img src="assets/skills/alt-magic.png" alt="Alt-Magic">
                    <span>Alt. Magic</span>
                </button>

                <button data-skill="cartography">
                    <img src="assets/skills/cartography.png" alt="Cartography">
                    <span>Cartography</span>
                </button>

                <button data-skill="archaeology">
                    <img src="assets/skills/archaeology.png" alt="Archaeology">
                    <span>Archaeology</span>
                </button>

            </div>

        </aside>

        <!-- MAIN CONTENT -->
        <section class="content" id="content">

            <div class="content-card">
                <h1>Mastery Calculator</h1>

                <p>
                    Select a skill from the left sidebar to begin calculating
                    mastery XP, intervals, and completion estimates.
                </p>
            </div>

        </section>

    </main>

    <footer>
        © 2026 Melvor Calculator • Fan-made tool by Gaz
    </footer>

    <script src="js/main.js"></script>

</body>

</html>
